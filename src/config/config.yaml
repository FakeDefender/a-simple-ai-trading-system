data:
  source: api
  symbol: aapl.us
  symbols:
  - aapl.us
  interval: d
  timeframe: 1d
  start_date: '2024-01-01'
  end_date: '2025-01-01'
  force_update: false
  path: ''
  paths: {}
  storage:
    base_dir: data/market_data
    raw_data_dir: raw
    processed_data_dir: processed
market:
  profile: auto
  symbol_profiles: {}
  symbol_overrides: {}
strategy:
  name: baseline_trend_following
  fast_ma: 10
  slow_ma: 20
  rsi_period: 14
  rsi_long_threshold: 55
  rsi_short_threshold: 45
  rsi_exit_long: 48
  rsi_exit_short: 52
  min_volume_ratio: 1.2
  allow_short: false
risk:
  stop_loss_pct: 0.02
  take_profit_pct: 0.06
  max_drawdown: 0.2
  daily_loss_limit: 0.05
  position_size: 1.0
  commission: 0.001
  slippage: 0.0005
execution_costs:
  fixed_commission: 0.0
  min_commission: 0.0
  sell_tax_rate: 0.0
backtest:
  initial_capital: 100000.0
  benchmark_source: market
  benchmark_symbol: ^ndx
  benchmark_enabled: true
  benchmark_fallback_to_target: true
  benchmark_yfinance_fallback: false
paper_trading:
  enabled: true
  initial_cash: 100000.0
  allocation_pct: 0.6
  allow_fractional: false
  allow_short: false
  lot_size: 1.0
  close_positions_on_finish: true
  price_field: close
  quantity_precision: 6
  rebalance_frequency: weekly
  rebalance_weekday: 0
  rebalance_day_of_month: 1
  turnover_buffer: 0.01
  max_account_drawdown: 0.2
  adapter: paper
portfolio:
  enabled: false
  target_gross_allocation: 0.95
  max_positions: 3
  max_gross_exposure: 1.0
  max_symbol_allocation: 0.35
  max_portfolio_drawdown: 0.2
  close_positions_on_finish: true
  price_field: close
  selection_metric: market_strength
  rebalance_frequency: daily
  rebalance_weekday: 0
  rebalance_day_of_month: 1
  turnover_buffer: 0.0
  adapter: paper
live_trading:
  enabled: false
  initial_cash: 100000.0
  allocation_pct: 0.95
  allow_fractional: false
  allow_short: true
  lot_size: 1.0
  quantity_precision: 6
  price_field: close
  adapter: paper_live
  timezone: Asia/Shanghai
  trading_days:
  - 0
  - 1
  - 2
  - 3
  - 4
  sessions:
  - start: 09:30
    end: '15:00'
  session_start: 09:30
  session_end: '15:00'
  exit_only_start: '14:55'
  cancel_after_seconds: 300
  max_order_retries: 2
  flatten_outside_trading_hours: false
  min_signal_strength: 0.0
  fill_delay_seconds: 0
  reject_first_n_orders: 0
  close_positions_on_finish: false
live_risk:
  max_order_notional: 0.0
  max_position_notional: 0.0
  max_daily_drawdown: 0.0
  max_open_orders: 10
  max_orders_per_day: 0
  max_consecutive_failures: 0
broker:
  provider: generic_rest
  paper: true
  base_url: ''
  account_id: ''
  timeout_seconds: 10.0
  endpoints:
    submit_order:
      method: POST
      path: /orders
    cancel_order:
      method: POST
      path: /orders/{broker_order_id}/cancel
    get_order:
      method: GET
      path: /orders/{broker_order_id}
    list_open_orders:
      method: GET
      path: /orders/open
    list_fills:
      method: GET
      path: /fills
    get_account:
      method: GET
      path: /account
    list_positions:
      method: GET
      path: /positions
live_service:
  poll_interval_seconds: 60
  force_update_each_cycle: true
  save_results_each_cycle: true
  max_cycles: 1
  stop_on_error: true
  results_root: results/live_service
monitoring:
  enabled: true
  max_recent_events: 2000
  event_journal_filename: live_events.jsonl
  alert_log_filename: live_alerts.jsonl
  drawdown_alert_threshold: 0.02
llm:
  enabled: true
  provider: deepseek
  model: deepseek-v4-flash
  review_model: deepseek-v4-flash
  temperature: 0.2
  max_tokens: 1200
  timeout: 120.0
  max_retries: 0
  review_max_tokens: 1200
  review_timeout: 120.0
  base_url: https://api.deepseek.com
  thinking: disabled
  review_thinking: disabled
  reasoning_effort: null
  event_factor_enabled: false
  event_factor_model: deepseek-v4-flash
  event_factor_max_tokens: 300
  event_factor_timeout: 30.0
  event_factor_thinking: disabled
  event_factor_reasoning_effort: null
